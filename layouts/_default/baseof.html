<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} / {{ .Site.Title }}{{ end }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playwrite+US+Modern:wght@100..400&family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <style>
body {
margin: 0;
font-family: Arial, sans-serif;
line-height: 1.6;
}
.menu, .bottom {
display: flex;
justify-content: space-between;
padding: 20px;
background-color: white;
text-transform: uppercase;
font-size: 24px;
}
.logo {
text-align: center;
padding: 40px 0;
}
.logo img {
width: 100%;
max-width: 800px;
height: auto;
}
.grid {
display: grid;
grid-template-columns: repeat(3, minmax(0, 1fr));
gap: 20px;
padding: 20px;
max-width: 1200px;
margin: 0 auto;
}
.post {
border: 1px solid #ddd;
padding: 20px;
background-color: white;
}
.post h4 {
margin: 0 0 8px;
font-size: 15px;
}
.post .author {
margin: 0 0 12px;
font-weight: 700;
/* font-family: Playwrite US Modern; */
}

.flip-container {
perspective: 1000px;
margin-bottom: 16px;
}
.flip-container:hover .flipper {
transform: rotateY(180deg);
}
.flipper {
transition: transform 0.6s;
transform-style: preserve-3d;
position: relative;
}
.front, .back1, .back2, .back3 {
backface-visibility: hidden;
}
.back1 {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
transform: rotateY(180deg);
background-color: #CDD592;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
padding: 10px;
box-sizing: border-box;
font-size: 15px;
color:#1B062B;
font-family: Playwrite IN;
}

.back2 {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
transform: rotateY(180deg);
background-color: #60866A;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
padding: 10px;
box-sizing: border-box;
font-size: 15px;
color:#C4D168;
font-family: Playwrite IN;
}

.back3 {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
transform: rotateY(180deg);
background-color: #90C7B7;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
padding: 10px;
box-sizing: border-box;
font-size: 15px;
color:#2C647C;
font-family: Playwrite IN;
}

.post img {
width: 100%;
height: auto;
display: block;
}

h4 {
    font-family: Playwrite IN;
}

.author {
    font-family: "Playwrite ID", cursive;
}

.opis {
    width: 60%;
    margin: 0 auto;
    font-size: 20px;
    line-height: 1.4;
    font-family: Playwrite IN;
}

.about {
    text-align: center;
    font-size: 50px;
}

      .gridmain {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      }

      @media (max-width: 768px) {
        .grid,
        .gridmain {
          grid-template-columns: 1fr;
        }

        .opis,
        article p,
        article h1,
        article h2,
        article h3,
        .footnotes,
        blockquote {
          width: 100%;
          margin-left: 0;
          margin-right: 0;
        }
      }

      a, a:visited {
        text-decoration: none;
        color: black;
      }
      a:hover, a:active {
        text-decoration: underline;
      }

            .photo {
      text-align: center;
      padding: 20px 0;
      }
      .photo img {
      width: 100%;
      max-width: 800px;
      height: auto;
      }

      
/* article {

} */

article {
  box-sizing: border-box;
}

/* Article body and text */
.article {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 16px;
  font-size: 17px;
  text-align: justify;
  box-sizing: border-box;
}

.article p {
  font-size: 17px;
  line-height: 1.6;
  margin: 0 0 1em 0;
}

/* Images inside articles should scale responsively and not overflow */
.article img,
.photo.img img,
article img {
  width: 100%;
  height: auto;
  display: block;
  margin: 20px 0;
  max-width: 100%;
}

/* Titles, lead and footnotes reuse the article max-width but remain centered */
.title,
.title2,
.lead,
.przypisy,
.wyimek {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 16px;
  box-sizing: border-box;
}

.title { font-size: 42px; font-family: Playwrite IN; }
.title2 { font-size: 25px; font-family: Playwrite IN; font-style: italic; }
.lead { font-size: 22px; text-align: justify; font-family: Playwrite IN; }
.przypisy { font-size: 15px; }
.wyimek { font-size: 19px; margin: 25px auto; font-family: "Playwrite US Modern"; }

/* Blockquote tuned to not overflow on small screens */
blockquote {
  max-width: 760px;
  margin: 25px auto;
  padding: 0 16px;
  font-size: 19px;
  box-sizing: border-box;
}

/* Responsive breakpoints */
@media (max-width: 1024px) {
  .title { font-size: 36px; }
  .lead { font-size: 20px; }
}

@media (max-width: 768px) {
  .grid, .gridmain { grid-template-columns: 1fr; }
  .article, .title, .title2, .lead, .przypisy { max-width: 92%; }
  .title { font-size: 32px; }
  .lead { font-size: 18px; }
  .article p { font-size: 16px; }
  blockquote, .wyimek { margin-left: 0; margin-right: 0; }
}

@media (max-width: 480px) {
  .title { font-size: 26px; }
  .lead { font-size: 16px; }
  .article p { font-size: 15px; }
}
    </style>
  </head>
  <body>
    <header>
      <section class="menu">
        {{ range .Site.Menus.main }}
      <a href="{{ .URL }}">{{ .Name }}</a>
       {{ end }}
      </section>

      <section class="logo">
      <a href="{{ .Site.BaseURL }}">
        <img src="{{ "ulga_logo.svg" | relURL }}" alt="Przekreślone tłuste litery napisu „Ulga”, logotyp magazynu">
      </a>
      </section>
    </header>

    <main>
      {{ block "main" . }}{{ end }}
    </main>

    <footer>

      <section class="logo">
      <a href="{{ .Site.BaseURL }}">
        <img src="{{ "ulga_logo.svg" | relURL }}" alt="Przekreślone tłuste litery napisu „Ulga”, logotyp magazynu">
      </a>
      </section>

      <section class="bottom">
        <div><a href="https://wbask.asp.waw.pl/" target="_blank">WBASK</a></div>
        <div>2026</div>
      </section>

    </footer>
  </body>
</html>
